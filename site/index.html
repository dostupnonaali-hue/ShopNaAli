<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopDoBaksa — Найдешевші знахідки з AliExpress до $1</title>
    <meta name="description"
        content="Щоденна добірка найкращих товарів до $1 з AliExpress. Перевірені знахідки, реальні відгуки, автоматичні знижки.">
    <meta name="keywords" content="AliExpress, халява, дешеві товари, до 1 долара, знахідки, розпродаж">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/icon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/icon-180.png">
    <!-- Open Graph -->
    <meta property="og:title" content="ShopDoBaksa — Знахідки до $1">
    <meta property="og:description" content="Щоденна добірка найвигідніших товарів з AliExpress">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="uk_UA">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header__inner">
            <a href="index.html" class="header__logo">
                <span class="header__logo-icon">🛒</span>
                <span>Shop<span class="gradient-text">DoBaksa</span></span>
            </a>

            <div class="header__search">
                <span class="header__search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Шукати товари..." autocomplete="off">
            </div>

            <div class="header__links">
                <a href="https://t.me/Shop_DoBaksa" target="_blank" class="header__tg-link">
                    ✈️ Telegram
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">

        <!-- Hero -->
        <section class="hero" id="hero">
            <div class="hero__badge">
                <span class="pulse"></span>
                Оновлюється автоматично
            </div>
            <h1 class="hero__title">
                Знахідки до <span class="gradient-text">$1</span><br>
                з AliExpress
            </h1>
            <p class="hero__subtitle">
                Щоденна добірка перевірених дешевих товарів з реальними відгуками та безкоштовною доставкою
            </p>
        </section>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stats__item">
                <div class="stats__number" id="statsProducts">0</div>
                <div class="stats__label">Товарів</div>
            </div>
            <div class="stats__item">
                <div class="stats__number" id="statsCategories">0</div>
                <div class="stats__label">Категорій</div>
            </div>
            <div class="stats__item">
                <div class="stats__number">24/7</div>
                <div class="stats__label">Моніторинг</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">🔥 Все</button>
            <button class="filter-btn" data-filter="hot">💎 Хіти</button>
            <button class="filter-btn" data-filter="new">🆕 Нові</button>
            <button class="filter-btn" data-filter="electronics">📱 Електроніка</button>
            <button class="filter-btn" data-filter="home">🏠 Дім</button>
            <button class="filter-btn" data-filter="fashion">👗 Мода</button>
            <button class="filter-btn" data-filter="toys">🎮 Іграшки</button>
            <button class="filter-btn" data-filter="auto">🚗 Авто</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <!-- Products rendered by JS -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 ShopDoBaksa — Агрегатор вигідних знахідок з AliExpress</p>
        <p style="margin-top: 8px;">
            <a href="https://t.me/Shop_DoBaksa" target="_blank">Telegram</a>
        </p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
